version: "2"

run:
  timeout: 2m
  issues-exit-code: 1

linters:
  default: none
  enable:
    - anyguard
  settings:
    custom:
      anyguard:
        type: module
        description: anyguard smoke test plugin
        original-url: github.com/tobythehutt/anyguard
        settings:
          allowlist: any_allowlist.yaml
          roots:
            - ./...
